<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .cart-container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .cart-header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding-bottom: 10px;
            border-bottom: 2px solid #007bff;
        }

        .cart-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            text-align: center;
            font-size: 18px;
            padding: 0;
            border-radius: 5px;
        }

        .btn-danger,
        .btn-success {
            width: 100%;
            margin-top: 10px;
        }

        .back-button {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="cart-container">
            <h2 class="cart-header">Your Shopping Cart</h2>
            <table class="table table-bordered text-center mt-3">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-table-body">
                    <!-- Cart items will be loaded here -->
                </tbody>
            </table>
            <h4 class="text-end">Total: <span id="cart-total">$0.00</span></h4>
            <button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>
            <button class="btn btn-success" onclick="proceedToCheckout()">Proceed to Checkout</button>
        </div>
    </div>
    <a href="./products.html" class="back-button"> Back to Products</a>
    <script src="../js/navbar.js"></script>
    <script src="../js/cart.js"></script>

</body>

</html>
